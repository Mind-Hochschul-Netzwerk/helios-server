services:
  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  database:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=database
    volumes:
      - ${DATA_DIR}/postgres/db/16/data:/var/lib/postgresql/data
    labels:
      - com.centurylinklabs.watchtower.enable=false

  # ---------------------------------------------------------------------------
  # RabbitMQ – Celery Message Broker
  # Management-UI erreichbar über Traefik unter ${RABBITMQ_HOST}
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - ${DATA_DIR}/rabbitmq:/var/lib/rabbitmq
    expose:
      - 5672
    labels:
      - com.centurylinklabs.watchtower.enable=false

  # ---------------------------------------------------------------------------
  # Helios App – Django + Gunicorn
  # Image wird lokal aus dem Dockerfile gebaut
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: helios-server:local
    restart: unless-stopped
    container_name: ${SERVICENAME}
    depends_on:
      - database
      - rabbitmq
    environment: &app-env
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CELERY_BROKER_URL: "amqp://user:${RABBITMQ_PASSWORD}@rabbitmq:5672//"
      SECRET_KEY: ${SECRET_KEY}
      EMAIL_OPTOUT_SECRET: ${EMAIL_OPTOUT_SECRET}
      DEBUG: False
      URL_HOST: https://${SERVICENAME}.${DOMAINNAME}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL}
      DEFAULT_FROM_EMAIL: ${ADMIN_EMAIL}
      TIME_ZONE: Europe/Berlin
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD}
    volumes: []
      #- ./server_ui/media:/app/server_ui/media:ro
      #- ./server_ui/templates:/app/server_ui/templates:ro
      #- ./heliosbooth:/app/heliosbooth:ro
      #- ./helios_auth/media:/app/helios_auth/media:ro
      #- ./helios_auth/templates:/app/helios_auth/templates:ro
      #- ./helios/media:/app/helios/media:ro
      #- ./helios/templates:/app/helios/templates:ro
    networks:
      - default
      - traefik
      - ldap
    labels:
      - traefik.enable=true
      - traefik.http.routers.${SERVICENAME}.middlewares=secheader@file
      - traefik.http.services.${SERVICENAME}.loadbalancer.server.port=8000
      - com.centurylinklabs.watchtower.enable=false

  # ---------------------------------------------------------------------------
  # Celery Worker – verarbeitet asynchrone Aufgaben (E-Mail-Versand, Stimmen)
  # Gleiches Image wie App, anderer Startbefehl
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: helios-server:local
    restart: unless-stopped
    command: uv run celery --app helios worker --events --beat --concurrency 4
    depends_on:
      - database
      - rabbitmq
    environment:
      <<: *app-env
    networks:
      - default
      - ldap
    labels:
      - com.centurylinklabs.watchtower.enable=false

# =============================================================================
# Netzwerke
# =============================================================================
networks:
  traefik:
    name: traefik
    external: true
  ldap:
    name: ldap
    external: true
