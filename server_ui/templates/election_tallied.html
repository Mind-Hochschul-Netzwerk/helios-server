{% extends 'server_ui/templates/base.html' %}

{% block content %}

  <h2 class="title">Wahl {{election.name}} bereits ausgezählt</h2>

  <p>
      Diese Wahl wurde bereits ausgezählt (oder zumindest hat begonnen die Auszählung), daher kannst du keine Stimme mehr abgeben.
  </p>

  <p>
      <a href="{% url "election@view" election.uuid %}">Wahl anzeigen</a>
  </p>
{% endblock %}
